<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>

  <!-- 下载箭头 -->
  <path d="M64 25 L64 85" stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M40 60 L64 85 L88 60" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 底座 -->
  <path d="M35 95 L93 95" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- AI 文字 -->
  <text x="64" y="118" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">AI</text>
</svg>
