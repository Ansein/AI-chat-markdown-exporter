<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 会话导出工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      background: #fff;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .status.detected {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status.unknown {
      background: #fff3e0;
      color: #ef6c00;
    }

    .status.error {
      background: #ffebee;
      color: #c62828;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #1a73e8;
      color: white;
    }

    .btn-primary:hover {
      background: #1557b0;
    }

    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #333;
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .option label {
      font-size: 13px;
      color: #444;
    }

    .switch {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.2s;
      border-radius: 20px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: 0.2s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #1a73e8;
    }

    input:checked + .slider:before {
      transform: translateX(16px);
    }

    .message-count {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #1a73e8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .progress {
      margin-top: 12px;
    }

    .progress-bar {
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #1a73e8;
      width: 0%;
      transition: width 0.3s;
    }

    .log {
      font-family: 'Consolas', monospace;
      font-size: 11px;
      color: #666;
      margin-top: 8px;
      max-height: 100px;
      overflow-y: auto;
    }

    .log-item {
      padding: 2px 0;
    }
  </style>
</head>
<body>
  <h1>📥 AI 会话导出工具</h1>

  <div id="status" class="status unknown">
    检测平台中...
  </div>

  <button id="exportBtn" class="btn btn-primary" disabled>
    导出当前会话
  </button>

  <div id="messageCount" class="message-count"></div>

  <div class="progress" style="display: none;">
    <div class="progress-bar">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">导出选项</div>

    <div class="option">
      <label>包含时间戳</label>
      <label class="switch">
        <input type="checkbox" id="optTimestamp" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="option">
      <label>包含模型信息</label>
      <label class="switch">
        <input type="checkbox" id="optModel" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="option">
      <label>包含引用来源</label>
      <label class="switch">
        <input type="checkbox" id="optReferences" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="option">
      <label>包含思考过程</label>
      <label class="switch">
        <input type="checkbox" id="optReasoning" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <button id="refreshBtn" class="btn btn-secondary">
      刷新检测
    </button>
  </div>

  <div id="log" class="log"></div>

  <script src="popup.js"></script>
</body>
</html>
